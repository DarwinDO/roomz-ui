name: Vercel Preview

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - dev
      - develop
    types:
      - completed
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy as a preview
        required: false
        default: dev

jobs:
  deploy-preview:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: vercel-preview-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.event.workflow_run.head_branch }}
      cancel-in-progress: true
    permissions:
      contents: read
    env:
      DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.event.workflow_run.head_sha }}
      DEPLOY_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.event.workflow_run.head_branch }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_REF }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build preview artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        id: deploy
        shell: bash
        run: |
          preview_url="$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --yes)"
          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"

      - name: Write job summary
        run: |
          echo "Preview branch: $DEPLOY_BRANCH" >> "$GITHUB_STEP_SUMMARY"
          echo "Preview URL: ${{ steps.deploy.outputs.preview_url }}" >> "$GITHUB_STEP_SUMMARY"
